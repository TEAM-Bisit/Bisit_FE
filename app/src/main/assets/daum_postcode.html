<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #wrap {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>
<div id="wrap"></div>

<script>
    var element_wrap = document.getElementById('wrap');

    new daum.Postcode({
        oncomplete: function(data) {
            var fullAddr = "(" + data.zonecode + ") " + data.address;

            if (window.AndroidBridge && window.AndroidBridge.onAddressSelected) {
                window.AndroidBridge.onAddressSelected(fullAddr);
            }
        },
        width: "100%",
        height: "100%"
    }).embed(element_wrap);
</script>

</body>
</html>
