<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>주소 검색</title>
    <style>
        body { font-family: system-ui, -apple-system, Roboto, 'Noto Sans KR', Arial; margin:0; }
        .top { padding:12px; display:flex; gap:8px; align-items:center; background:#fff; border-bottom:1px solid #eee; }
        #q { flex:1; padding:10px; font-size:16px; border:1px solid #ddd; border-radius:8px; }
        #btn { padding:10px 12px; font-size:15px; border-radius:8px; border: none; background:#4076FF; color:#fff; }
        #results { padding:8px; }
        .item { padding:12px; border-bottom:1px solid #f1f1f1; cursor:pointer; }
        .addr-title { font-weight:600; color:#222; }
        .addr-sub { font-size:13px; color:#666; margin-top:6px; white-space:pre-line; }
        .nores { padding:12px; color:#888; }
    </style>
</head>
<body>
<div class="top">
    <input id="q" type="search" placeholder="도로명/지번/건물명 입력" />
    <button id="btn">검색</button>
</div>
<div id="results"></div>

<script>
    const resultsEl = document.getElementById('results');
    const qEl = document.getElementById('q');

    // ★ 여기만 바꾸면 됨 — 너희 서버 주소로
    const PROXY_URL = "https://your-server.com/api/address/search?q=";

    async function search() {
        const q = qEl.value.trim();
        if (!q) {
            resultsEl.innerHTML = '<div class="nores">검색어를 입력해 주세요.</div>';
            return;
        }

        resultsEl.innerHTML = '<div class="nores">검색 중...</div>';

        try {
            const res = await fetch(PROXY_URL + encodeURIComponent(q));

            if (!res.ok) {
                resultsEl.innerHTML = '<div class="nores">API 호출 실패: ' + res.status + '</div>';
                return;
            }

            const data = await res.json();

            if (!data.addresses || data.addresses.length === 0) {
                resultsEl.innerHTML = '<div class="nores">검색 결과가 없습니다.</div>';
                return;
            }

            resultsEl.innerHTML = '';

            data.addresses.forEach(addr => {
                const road = addr.roadAddress || '';
                const jibun = addr.jibunAddress || '';
                const building = addr.buildingName || '';
                const display = road || jibun || addr.address;
                const lat = addr.y || '';
                const lng = addr.x || '';

                const item = document.createElement('div');
                item.className = 'item';

                item.innerHTML = `
                    <div class="addr-title">${display}</div>
                    <div class="addr-sub">
                        지번: ${jibun}
                        \n건물명: ${building}
                        \n좌표: ${lat}, ${lng}
                    </div>
                `;

                item.onclick = () => {
                    if (window.Android?.onAddressSelected) {
                        window.Android.onAddressSelected(display, lat, lng, road, jibun);
                    } else {
                        alert("Android 인터페이스 없음");
                    }
                };

                resultsEl.appendChild(item);
            });

        } catch (e) {
            resultsEl.innerHTML = '<div class="nores">오류: ' + (e.message || e) + '</div>';
            console.error(e);
        }
    }

    document.getElementById('btn').addEventListener('click', search);
    qEl.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

    qEl.focus();
</script>
</body>
</html>
